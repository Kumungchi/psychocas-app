<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Psychočas – Offline</title>
    <style>
      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(180deg, #1d4f7d 0%, #08304f 100%);
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 32px;
        text-align: center;
      }
      .card {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 32px;
        max-width: 420px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(12px);
      }
      h1 {
        font-size: 28px;
        margin-bottom: 12px;
      }
      p {
        font-size: 16px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.85);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: rgba(255, 255, 255, 0.15);
        padding: 6px 12px;
        border-radius: 9999px;
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">Offline režim</div>
      <h1>Psychočas je momentálně offline</h1>
      <p>
        Aplikace funguje v omezeném režimu bez připojení k internetu. Zkuste se prosím připojit k síti – po navázání spojení bude vše automaticky aktualizováno.
      </p>
    </div>
  </body>
</html>
