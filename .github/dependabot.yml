version: 2
updates:
  - package-ecosystem: npm
    directory: /nextjs-app
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Prague
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
