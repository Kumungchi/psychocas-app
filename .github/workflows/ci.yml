name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: nextjs-app

jobs:
  quality:
    name: Lint, tests, security, and Convex types
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nextjs-app/package-lock.json
      - run: npm ci --no-audit
      - run: npm run verify:quick
      - run: npm audit --audit-level=high

  production-build:
    name: Vercel-like production build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PRESERVE_NEXT_CACHE: 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nextjs-app/package-lock.json
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: nextjs-app/.next/cache
          key: next-${{ runner.os }}-${{ hashFiles('nextjs-app/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('nextjs-app/package-lock.json') }}-
      - run: npm ci --no-audit
      - run: npm run test:vercel
