<!-- Simple SVG icon for Psychočas -->
<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="#1d4f7d"/>
  
  <!-- Simplified brain/psychology icon -->
  <g transform="translate(48, 48)">
    <!-- Main circle for head -->
    <circle cx="48" cy="48" r="36" fill="none" stroke="white" stroke-width="4"/>
    
    <!-- Brain pattern -->
    <path d="M30 40 Q40 30 50 40 Q60 35 70 45" fill="none" stroke="white" stroke-width="2"/>
    <path d="M25 50 Q35 45 45 55 Q55 50 65 60" fill="none" stroke="white" stroke-width="2"/>
    
    <!-- Letter P for Psychočas -->
    <text x="48" y="56" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">P</text>
  </g>
  
  <!-- App name -->
  <text x="96" y="168" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">Psychočas</text>
</svg>