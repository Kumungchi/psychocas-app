name: Production release

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Commit, tag, or branch to release
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: psychocas-production
  cancel-in-progress: false

defaults:
  run:
    working-directory: nextjs-app

jobs:
  release:
    name: Convex then Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.git_ref }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nextjs-app/package-lock.json
      - run: npm ci --no-audit
      - run: npm run verify:quick
      - run: npm run test:vercel
      - name: Verify required release secrets
        shell: bash
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          test -n "$CONVEX_DEPLOY_KEY"
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
      - name: Deploy Convex backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex deploy --typecheck enable --codegen enable --message "GitHub release $GITHUB_SHA"
      - name: Pull production Vercel configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@56.3.1 pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build frontend against production configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@56.3.1 build --prod --token="$VERCEL_TOKEN"
      - name: Deploy frontend to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@56.3.1 deploy --prebuilt --prod --token="$VERCEL_TOKEN"
      - name: Verify custom domain health
        shell: bash
        run: curl --fail --retry 5 --retry-all-errors --retry-delay 10 https://app.psychocas.cz/api/health
