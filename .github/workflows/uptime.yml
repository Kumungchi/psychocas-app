name: Production uptime

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-uptime
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check web and Convex health
        run: curl --fail --silent --show-error --retry 3 --retry-all-errors --retry-delay 5 https://app.psychocas.cz/api/health
